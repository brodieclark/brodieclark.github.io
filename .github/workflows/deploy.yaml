name: Deploy to GitHub Pages

on:
  push:
    branches:
      - gh-pages  # Set this to the branch you want to deploy from

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '21'  # Set this to the node version you are using

    - name: Install Dependencies
      run: npm install

    - name: Build and Deploy
      env:
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}  # Set your API key in the environment
      run: |
        # Set the API key in your environment, or directly in your build process
        echo "REACT_APP_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}" > .env
        npm run build
        npm run deploy
